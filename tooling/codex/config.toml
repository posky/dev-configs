approval_policy = "on-request"
sandbox_mode = "workspace-write"

model = "gpt-5.4"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"

web_search = "live"
personality = "pragmatic"

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for repo-aware evidence gathering, impact hints, and validation path discovery."
config_file = "agents/explorer.toml"

[agents.architect]
description = "Read-only planning specialist for grounded requirements analysis, interface impact, sequencing, and acceptance criteria."
config_file = "agents/architect.toml"

[agents.worker]
description = "Implementation-focused agent for minimal code changes with prerequisite inspection and focused verification."
config_file = "agents/worker.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, regressions, config or docs drift, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Read-only documentation researcher for official API, option, and version-behavior verification."
config_file = "agents/docs-researcher.toml"

[agents.monitor]
description = "Read-only monitor for long-running tasks, retries, blocked progress, and status transitions."
config_file = "agents/monitor.toml"

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "five-hour-limit", "weekly-limit", "context-window-size", "used-tokens", "total-input-tokens", "total-output-tokens"]
theme = "catppuccin-mocha"

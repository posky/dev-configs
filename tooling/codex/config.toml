approval_policy = "on-request"
sandbox_mode = "workspace-write"

model = "gpt-5.4"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"

web_search = "live"
personality = "pragmatic"

[features]
collaboration_modes = true
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for fast investigation, impact analysis, and evidence gathering."
config_file = "agents/explorer.toml"

[agents.architect]
description = "System design and planning specialist for requirements analysis, tradeoffs, and implementation plans."
config_file = "agents/architect.toml"

[agents.worker]
description = "Implementation-focused agent for making the smallest defensible code change and validating it."
config_file = "agents/worker.toml"

[agents.reviewer]
description = "Code reviewer focused on correctness, regressions, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.monitor]
description = "Long-running task monitor for tests, builds, logs, and command observation."
config_file = "agents/monitor.toml"

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "five-hour-limit", "weekly-limit", "context-window-size", "used-tokens", "total-input-tokens", "total-output-tokens"]
theme = "catppuccin-mocha"

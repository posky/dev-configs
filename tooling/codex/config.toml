approval_policy = "on-request"
sandbox_mode = "workspace-write"

# Single-writer model:
# - `worker` is the only role that may mutate repo-tracked files.
# - `default`, `explorer`, `architect`, `reviewer`, `docs_researcher`,
#   `monitor`, and `validator` must not edit, create, delete, rename, or
#   rewrite files even if the parent session is writable.

model = "gpt-5.4"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"

web_search = "live"
personality = "pragmatic"

[agents]
max_threads = 6
max_depth = 1

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
  "used-tokens",
  "context-window-size",
  "total-input-tokens",
  "total-output-tokens",
  "current-dir",
  "codex-version",
]
theme = "catppuccin-mocha"

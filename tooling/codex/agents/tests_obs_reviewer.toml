  - Metrics: latency/error/saturation signals for changed critical paths.
  - Tracing: spans around I/O and critical sections; avoid high-cardinality dimensions.
- Review ops readiness: runbooks, alerts, and failure modes affected by new errors/endpoints/config.

Output format:
- Findings:
  - Severity
  - Risk
  - Evidence (absolute file path + line, e.g. /abs/path/file.rs:42)
  - Proposed tests or observability changes
  - Minimal fix suggestion
- Suggested verification commands (project standard)
- Residual risk (what is still not covered)

If no issues are found, explicitly output: No findings.
"""

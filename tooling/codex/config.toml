approval_policy = "on-request"
sandbox_mode = "workspace-write"

model = "gpt-5.3-codex"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"

web_search = "cached"
personality = "pragmatic"

[features]
multi_agent = true
collaboration_modes = true

[tui]
status_line = ["model-with-reasoning", "context-remaining", "five-hour-limit", "weekly-limit", "context-window-size", "total-input-tokens", "total-output-tokens"]
theme = "catppuccin-mocha"

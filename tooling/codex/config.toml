approval_policy = "on-request"
sandbox_mode = "workspace-write"

model = "gpt-5.3-codex"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"

web_search = "live"
personality = "pragmatic"

[features]
collaboration_modes = true
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.scope_mapper]
description = "Read-only impact mapper and reviewer router (contracts/modules/data/config)."
config_file = "agents/scope_mapper.toml"

[agents.correctness_reviewer]
description = "Read-only correctness reviewer (behavior, invariants, regressions, compatibility)."
config_file = "agents/correctness_reviewer.toml"

[agents.security_reviewer]
description = "Read-only security reviewer (authn/authz, validation, sensitive data, attack surface)."
config_file = "agents/security_reviewer.toml"

[agents.perf_reliability_reviewer]
description = "Read-only performance and reliability reviewer (contention, timeouts/retries, resources, scaling)."
config_file = "agents/perf_reliability_reviewer.toml"

[agents.tests_obs_reviewer]
description = "Read-only tests and observability reviewer (coverage, regressions, logs/metrics/tracing, ops readiness)."
config_file = "agents/tests_obs_reviewer.toml"

[agents.worker]
description = "Writer agent for minimal, targeted implementation patches."
config_file = "agents/worker.toml"

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "current-dir",
  "five-hour-limit",
  "weekly-limit",
  "context-window-size",
  "used-tokens",
  "total-input-tokens",
  "total-output-tokens",
]
